<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-gray-100 text-gray-800">
    <header class="w-[80%] mx-auto">
        <h1 class="text-4xl font-bold ">Job Application Tracker</h1>
        <div class="grid grid-cols-3 gap-8 ">
            <div class="bg-white p-4 rounded-[5px]">
                <p>Total</p>
                <p id="total">0</p>
            </div>
            <div class="bg-white p-4 rounded-[5px]">
                <p>Interview</p>
                <p id="cnt-interview">0</p>
            </div>
            <div class="bg-white p-4 rounded-[5px]">
                <p>Rejected</p>
                <p id="cnt-rejected">0</p>
            </div>
        </div>
    </header>
    <hr class="w-[80%] mx-auto my-8 border-gray-300">
    <main class="w-[80%] mx-auto">
        <div class="">
            <button class="bg-blue-500 px-5 py-2 rounded-sm text-white" id="all-filter-btn">All</button>
            <button class="bg-white  px-5 py-2" id="interview-filter-btn" >Interview</button>
            <button class="bg-white  px-5 py-2" id="rejected-filter-btn">Rejected</button>
        </div>
        
    </main>
</body>

</html>
